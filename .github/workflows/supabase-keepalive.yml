name: Supabase Keep-Alive

on:
  schedule:
    # 매주 월요일, 목요일 03:17 UTC (KST 12:17)
    - cron: '17 3 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY secret"
            exit 1
          fi

          response=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/mood_records?select=id&limit=1")

          echo "HTTP $response"
          cat /tmp/body

          if [ "$response" != "200" ]; then
            echo "Keep-alive query failed"
            exit 1
          fi
